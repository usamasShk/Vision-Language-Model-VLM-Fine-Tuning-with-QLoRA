[client]
showErrorDetails = true
toolbarMode = "viewer"
logger.level = "debug"

[logger]
level = "debug"

[theme]
primaryColor = "#1f77b4"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f0f2f6"
textColor = "#262730"
font = "sans serif"

[server]
port = 8501
headless = true
runOnSave = false
maxUploadSize = 50
enableXsrfProtection = true
enableCORS = false

# Increase health check timeout for model loading
[healthz]
enabled = false

# Session settings
[client.logger]
level = "debug"

# Memory and performance
[client.showErrorDetails]
value = true

# Timeout settings
[server.fileWatcherType]
type = "polling"
pollInterval = 1.0

# SSL settings (for production)
[server.sslCertFile]
value = ""

[server.sslKeyFile]
value = ""

# Increase session timeout
[client.sessionState]
maximumEntries = 1000
